name: Packagist

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: Update Packagist
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Packagist update
        run: |
          if [ -z "${PACKAGIST_USERNAME}" ] || [ -z "${PACKAGIST_API_TOKEN}" ] || [ -z "${PACKAGIST_PACKAGE_URL}" ]; then
            echo "Packagist update skipped. Configure PACKAGIST_USERNAME, PACKAGIST_API_TOKEN and PACKAGIST_PACKAGE_URL."
            exit 0
          fi

          curl --fail --show-error --silent \
            --request POST \
            --header 'content-type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            --data "{\"repository\":{\"url\":\"${PACKAGIST_PACKAGE_URL}\"}}"
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          PACKAGIST_PACKAGE_URL: ${{ vars.PACKAGIST_PACKAGE_URL }}
